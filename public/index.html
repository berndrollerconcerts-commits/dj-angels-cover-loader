<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJ ANGELS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .neon-border { box-shadow: 0 0 20px rgba(29, 185, 84, 0.2); }
    .icon { width: 48px; height: 48px; margin: 0 10px; transition: transform 0.2s; }
    .icon:hover { transform: scale(1.2); }
  </style>
</head>
<body class="p-6">

  <div class="max-w-md w-full text-center">

    <header class="flex justify-between items-center mb-10 opacity-40 text-[10px] tracking-[0.5em]">
      <span>☰</span>
      <h1>DJ ANGELS</h1>
      <span>👤</span>
    </header>

    <!-- Cover -->
    <div class="relative aspect-square rounded-[2rem] overflow-hidden mb-8 border border-white/10 shadow-2xl bg-zinc-900 neon-border">
      <img id="cover" src="https://placehold.co/600x600/111/fff?text=DJ+ANGELS" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/600x600/111/fff?text=DJ+ANGELS'">
    </div>

    <!-- Titel -->
    <h2 id="title" class="text-3xl font-bold mb-6 uppercase tracking-tighter">Laden...</h2>

    <!-- Streaming Links -->
    <div class="flex justify-center mb-10">
      <a id="spotify-link" href="#" target="_blank"><img src="/icons/spotify.svg" alt="Spotify" class="icon"></a>
      <a href="https://music.apple.com/de/artist/dj-angels/1816599214" target="_blank"><img src="/icons/apple.svg" alt="Apple Music" class="icon"></a>
      <a href="https://music.amazon.de/artists/B08LCNJ33K/dj-angels" target="_blank"><img src="/icons/amazon.svg" alt="Amazon Music" class="icon"></a>
    </div>

    <!-- Spotify Embed Player -->
    <div class="w-full rounded-[2rem] overflow-hidden border border-white/10 shadow-lg bg-zinc-900">
      <iframe id="spotify-player" src="https://open.spotify.com/embed/album/0kQNJeVJkWP3ViM4UokDAS" width="100%" height="352" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
    </div>

  </div>

  <script>
    async function fetchTrack() {
      try {
        const res = await fetch('/api/current-track');
        const data = await res.json();
        if (data.cover) document.getElementById("cover").src = data.cover;
        if (data.name) document.getElementById("title").innerText = data.name;
        if (data.link) document.getElementById("spotify-link").href = data.link;
      } catch (e) {
        console.error("Fehler beim Laden des Tracks:", e);
        document.getElementById("title").innerText = "DJ ANGELS";
        document.getElementById("cover").src = "https://placehold.co/600x600/111/fff?text=DJ+ANGELS";
      }
    }

    window.onload = fetchTrack;
  </script>

</body>
</html>
