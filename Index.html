<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"><title>DJ Angels</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex flex-col items-center p-10">
  <div class="max-w-md w-full text-center">
    <h1 class="text-[10px] tracking-[0.5em] mb-10">DJ ANGELS</h1>
    <img id="cover" src="" class="w-full rounded-3xl mb-5 shadow-2xl">
    <h2 id="title" class="text-3xl font-bold mb-5 uppercase">Loading...</h2>
    <a id="link" href="#" target="_blank" class="inline-block bg-green-500 p-4 rounded-full">Spotify</a>
  </div>

  <script>
    async function load() {
      try {
        const res = await fetch('/api'); // Einfach nur /api rufen
        const data = await res.json();
        document.getElementById("cover").src = data.cover;
        document.getElementById("title").innerText = data.name;
        document.getElementById("link").href = data.link;
      } catch (e) {
        document.getElementById("title").innerText = "OFFLINE";
      }
    }
    window.onload = load;
  </script>
</body>
</html>
