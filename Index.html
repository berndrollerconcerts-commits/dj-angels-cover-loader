<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DJ Angels | Cover Loader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { margin: 0; font-family: sans-serif; color: white; background: #000; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-text { text-shadow: 0 0 15px rgba(255, 255, 255, 0.4); }
    .bg-logo { position: fixed; inset: 0; background-image: url('dj-angels-bg.png'); background-position: center; background-repeat: no-repeat; background-size: 70%; opacity: 0.15; z-index: -1; }
  </style>
</head>
<body class="p-6">
  <div class="bg-logo"></div>
  <div class="max-w-md w-full flex flex-col text-center">
    <header class="w-full flex justify-between items-center mb-10">
      <span class="text-xl opacity-50">☰</span>
      <h1 class="tracking-[0.5em] font-light text-[10px] uppercase">DJ ANGELS</h1>
      <span class="text-xl opacity-50">👤</span>
    </header>

    <div class="relative w-full aspect-square rounded-[2.5rem] overflow-hidden mb-8 border border-white/10 shadow-2xl bg-zinc-900">
      <img id="currentCover" src="" class="w-full h-full object-cover">
    </div>

    <h2 id="currentTitle" class="text-4xl font-bold neon-text mb-1 uppercase tracking-tight">Loading...</h2>
    <p class="text-[9px] tracking-[0.3em] text-cyan-400 font-bold mb-10 uppercase">Available on Spotify</p>

    <div class="flex justify-center mb-10">
      <a id="spotifyLink" href="#" target="_blank" class="hover:scale-110 transition-all">
        <svg class="w-12 h-12" viewBox="0 0 168 168"><circle cx="84" cy="84" r="84" fill="#1DB954"/><path d="M119 114c-1.5 2.5-4.5 3.2-7 1.7-19-11.5-43-14-71-7-3 0.8-6-1-6.8-4-0.8-3 1-6 4-6.8 31-8 58-5 80 8 2.5 1.5 3.2 4.5 1.7 7z" fill="white"/><path d="M124 94c-2 3-6 4-9 2-22-13-55-17-81-8-3 1-7-1-8-5s1-7 5-8c30-9 67-5 93 10 3 2 4 6 2 9z" fill="white"/><path d="M126 72c-26-15-69-16-94-8-4 1-8-1-9-5-1-4 1-8 5-9 29-9 77-8 107 10 4 2 5 7 3 11-2 4-7 5-11 1z" fill="white"/></svg>
      </a>
    </div>
  </div>

  <script>
    async function loadData() {
      try {
        const res = await fetch('/api'); 
        if (!res.ok) throw new Error('Offline');
        const data = await res.json();
        document.getElementById("currentCover").src = data.cover;
        document.getElementById("currentTitle").innerText = data.name; 
        document.getElementById("spotifyLink").href = data.link;
      } catch (err) {
        document.getElementById("currentTitle").innerText = "OFFLINE";
      }
    }
    window.onload = loadData;
  </script>
</body>
</html>
